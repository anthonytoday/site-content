<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="/assets/images/favicon.png">
<style>
  :root{--navy:#051C2C;--blue:#2251FF;--white:#FFFFFF}
  body{margin:0}
  .site-header{position:sticky;top:0;z-index:999;background:var(--navy);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
  .site-header .bar{max-width:1200px;margin:0 auto;padding:14px 24px;
    display:flex;align-items:center;justify-content:space-between;gap:24px}
  .site-header .brand{color:var(--white);font-weight:700;font-size:19px;
    text-decoration:none;letter-spacing:-.02em;white-space:nowrap}
  .site-header nav{display:flex;align-items:center;gap:26px;flex-wrap:wrap}
  .site-header nav a{color:rgba(255,255,255,.82);text-decoration:none;
    font-size:15px;font-weight:500;transition:color .15s}
  .site-header nav a:hover,.site-header nav a[aria-current="page"]{color:var(--white)}
  .site-header .cta{background:var(--blue);color:var(--white);padding:9px 18px;
    border-radius:6px;font-weight:600;white-space:nowrap}
  .site-header .cta:hover{opacity:.9;color:var(--white)}
  .nav-toggle{display:none;background:none;border:0;color:var(--white);
    font-size:24px;cursor:pointer;line-height:1}
  @media(max-width:860px){
    .nav-toggle{display:block}
    .site-header nav{display:none;width:100%;flex-direction:column;
      align-items:flex-start;gap:14px;padding:16px 0 4px}
    .site-header nav.open{display:flex}
    .site-header .bar{flex-wrap:wrap}
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="bar">
    <a class="brand" href="/">Anthony Today</a>
    <button class="nav-toggle" aria-label="Menu" onclick="document.getElementById('nav').classList.toggle('open')">&#9776;</button>
    <nav id="nav">
      {% assign nav = "Notion,/notion/|Cyber,/cyber/|GRC,/cyber-grc/|Fractional CISO,/fractional-ciso/|Tools,/tools/|Guides,/guide/" | split: "|" %}
      {% for item in nav %}
        {% assign parts = item | split: "," %}
        <a href="{{ parts[1] }}"{% if page.url == parts[1] %} aria-current="page"{% endif %}>{{ parts[0] }}</a>
      {% endfor %}
      <a class="cta" href="/contact/">Contact</a>
    </nav>
  </div>
</header>

<main>
{{ content }}
</main>

</body>
</html>
