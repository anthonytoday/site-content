<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title | default: site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" href="/assets/images/favicon.png">
<style>
  :root{--navy:#051C2C;--navy-2:#0A2B42;--blue:#2251FF;--white:#FFFFFF}
  body{margin:0}
  .site-header{position:sticky;top:0;z-index:999;background:var(--navy);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
  .site-header .bar{max-width:1200px;margin:0 auto;padding:14px 24px;
    display:flex;align-items:center;justify-content:space-between;gap:24px}
  .site-header .brand{color:var(--white);font-weight:700;font-size:19px;
    text-decoration:none;letter-spacing:-.02em;white-space:nowrap}
  .site-header nav{display:flex;align-items:center;gap:26px}
  .site-header nav a{color:rgba(255,255,255,.82);text-decoration:none;
    font-size:15px;font-weight:500;transition:color .15s;white-space:nowrap}
  .site-header nav a:hover,.site-header nav a[aria-current="page"]{color:var(--white)}
  .nav-item{position:relative;display:flex;align-items:center}
  .nav-item>a::after{content:"";display:inline-block;margin-left:6px;
    border:4px solid transparent;border-top-color:currentColor;
    transform:translateY(2px);transition:transform .15s}
  .nav-item:hover>a::after{transform:translateY(2px) rotate(180deg)}
  .sub{position:absolute;top:100%;left:-14px;min-width:190px;padding:8px 0;
    background:var(--navy-2);border-radius:8px;
    box-shadow:0 12px 28px rgba(0,0,0,.32);
    opacity:0;visibility:hidden;transform:translateY(6px);
    transition:opacity .15s,transform .15s,visibility .15s}
  .nav-item::after{content:"";position:absolute;top:100%;left:0;right:0;height:14px}
  .nav-item:hover .sub,.nav-item:focus-within .sub{opacity:1;visibility:visible;transform:translateY(0)}
  .sub a{display:block;padding:9px 18px;font-size:14.5px}
  .sub a:hover{background:rgba(255,255,255,.08)}
  .site-header .cta{background:var(--blue);color:var(--white);padding:9px 18px;
    border-radius:6px;font-weight:600}
  .site-header .cta:hover{opacity:.9;color:var(--white)}
  .nav-toggle{display:none;background:none;border:0;color:var(--white);
    font-size:24px;cursor:pointer;line-height:1}
  @media(max-width:900px){
    .nav-toggle{display:block}
    .site-header .bar{flex-wrap:wrap}
    .site-header nav{display:none;width:100%;flex-direction:column;
      align-items:flex-start;gap:14px;padding:16px 0 6px}
    .site-header nav.open{display:flex}
    .nav-item{flex-direction:column;align-items:flex-start;width:100%}
    .nav-item>a::after{display:none}
    .nav-item::after{display:none}
    .sub{position:static;opacity:1;visibility:visible;transform:none;
      background:none;box-shadow:none;padding:8px 0 0 16px;min-width:0}
    .sub a{padding:6px 0;color:rgba(255,255,255,.62)}
    .sub a:hover{background:none}
  }
</style>
</head>
<body>

<header class="site-header">
  <div class="bar">
    <a class="brand" href="/">Anthony Today</a>
    <button class="nav-toggle" aria-label="Menu" onclick="document.getElementById('nav').classList.toggle('open')">&#9776;</button>
    <nav id="nav">
      <a href="/"{% if page.url == "/" %} aria-current="page"{% endif %}>Home</a>

      <div class="nav-item">
        <a href="/notion/"{% if page.url == "/notion/" %} aria-current="page"{% endif %}>Notion</a>
        <div class="sub">
          <a href="/guide/"{% if page.url == "/guide/" %} aria-current="page"{% endif %}>Guide</a>
          <a href="/use-case/"{% if page.url == "/use-case/" %} aria-current="page"{% endif %}>Use Cases</a>
        </div>
      </div>

      <div class="nav-item">
        <a href="/cyber/"{% if page.url == "/cyber/" %} aria-current="page"{% endif %}>Cyber</a>
        <div class="sub">
          <a href="/cyber-grc/"{% if page.url == "/cyber-grc/" %} aria-current="page"{% endif %}>GRC</a>
          <a href="/fractional-ciso/"{% if page.url == "/fractional-ciso/" %} aria-current="page"{% endif %}>Fractional CISO</a>
        </div>
      </div>

      <a href="/tools/"{% if page.url == "/tools/" %} aria-current="page"{% endif %}>Tools</a>
      <a class="cta" href="/contact/">Contact</a>
    </nav>
  </div>
</header>

<main>
{{ content }}
</main>

<style id="global-mobile">
@media(max-width:768px){
  html,body{overflow-x:hidden}
  img,svg,video,iframe{max-width:100%;height:auto}
  pre,code{max-width:100%;overflow-x:auto}
  table{display:block;max-width:100%;overflow-x:auto}

  /* collapse every multi-column grid to a single column */
  [class*="grid"]{grid-template-columns:1fr !important;gap:16px !important}
  [class*="grid"]>*{grid-column:auto !important;grid-row:auto !important}
  .hero{grid-template-columns:1fr !important;gap:26px !important;padding:38px 20px !important}

  /* keep Services/Products labels attached to the right cards when stacked */
  .value-grid{display:flex !important;flex-direction:column !important}
  .value-grid>*:nth-child(1){order:1}
  .value-grid>*:nth-child(3){order:2}
  .value-grid>*:nth-child(4){order:3}
  .value-grid>*:nth-child(2){order:4}
  .value-grid>*:nth-child(5){order:5}
  .value-category-header{margin-bottom:0 !important;padding-bottom:10px !important}

  [class*="flex"]{flex-direction:column !important}

  h1,.hero h1{font-size:27px !important;line-height:1.24 !important}
  h2{font-size:21px !important;line-height:1.32 !important}
  h3{font-size:17px !important}
  .subtitle{font-size:15px !important;line-height:1.65 !important}

  /* nothing forced onto one line may push the page sideways */
  [style*="nowrap"],[class*="nowrap"]{white-space:normal !important}

  .cta-button,.tool-cta,.btn{display:block !important;width:100% !important;
    box-sizing:border-box !important;text-align:center !important;white-space:normal !important}
  .btns{flex-direction:column !important;gap:12px !important;align-items:stretch !important}

  section{padding-left:18px !important;padding-right:18px !important}
}
</style>
</body>
</html>
